---
# Local-development Airflow stack for the weather ETL pipeline.
#   - LocalExecutor (no Redis/Celery worker needed)
#   - airflow_postgres : Airflow metadata DB
#   - weather_postgres : the destination DB for the ETL (raw + analytics)
# All sensitive values come from .env via ${VAR} substitution.

x-airflow-common: &airflow-common
  image: ${AIRFLOW_IMAGE_NAME:-apache/airflow:2.10.3}
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: ${AIRFLOW__CORE__EXECUTOR:-LocalExecutor}
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN}
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: ${AIRFLOW__CORE__LOAD_EXAMPLES:-False}
    AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session'
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
    # ETL-side configuration that src/*.py reads with os.getenv()
    WEATHERSTACK_API_KEY: ${WEATHERSTACK_API_KEY}
    WEATHER_DB_HOST: ${WEATHER_DB_HOST}
    WEATHER_DB_PORT: ${WEATHER_DB_PORT}
    WEATHER_DB_NAME: ${WEATHER_DB_NAME}
    WEATHER_DB_USER: ${WEATHER_DB_USER}
    WEATHER_DB_PASSWORD: ${WEATHER_DB_PASSWORD}
    # Pandas is an optional extra in 2.10; ensure it's present along with the
    # libs the ETL needs. For production, build a custom image instead.
    _PIP_ADDITIONAL_REQUIREMENTS: ${_PIP_ADDITIONAL_REQUIREMENTS:-pandas requests sqlalchemy psycopg2-binary}
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./config:/opt/airflow/config
    - ./plugins:/opt/airflow/plugins
    - ./src:/opt/airflow/src
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on: &airflow-common-depends-on
    airflow_postgres:
      condition: service_healthy
    weather_postgres:
      condition: service_healthy

services:
  airflow_postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: ${AIRFLOW_DB_USER:-airflow}
      POSTGRES_PASSWORD: ${AIRFLOW_DB_PASSWORD:-airflow}
      POSTGRES_DB: ${AIRFLOW_DB_NAME:-airflow}
    volumes:
      - airflow-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${AIRFLOW_DB_USER:-airflow}", "-d", "${AIRFLOW_DB_NAME:-airflow}"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always

  weather_postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: ${WEATHER_DB_USER}
      POSTGRES_PASSWORD: ${WEATHER_DB_PASSWORD}
      POSTGRES_DB: ${WEATHER_DB_NAME}
    volumes:
      - weather-db-data:/var/lib/postgresql/data
      # Postgres runs every *.sql in this directory the first time the volume
      # is initialised. That's how raw.* and analytics.* schemas get created.
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5433:5432"           # expose on host for DBeaver / psql, no clash with 5432
    healthcheck:
      # -d is required: pg_isready without it defaults to db=<user>, which doesn't exist
      test: ["CMD", "pg_isready", "-U", "${WEATHER_DB_USER}", "-d", "${WEATHER_DB_NAME}"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        mkdir -p /sources/logs /sources/dags /sources/plugins /sources/src
        chown -R "${AIRFLOW_UID:-50000}:0" /sources/{logs,dags,plugins,src}
        exec /entrypoint airflow version
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: ${AIRFLOW_ADMIN_USERNAME:-airflow}
      _AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:-airflow}
      _PIP_ADDITIONAL_REQUIREMENTS: ''
    user: "0:0"
    volumes:
      - .:/sources

volumes:
  airflow-db-data:
  weather-db-data:
